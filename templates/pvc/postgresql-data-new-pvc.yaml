apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-data-new-pvc-11-db
  namespace: {{ .Values.global.namespace }}

spec:
  accessModes:
    - ReadWriteMany

  storageClassName: {{ .Values.global.storageClassName }}

  resources:
    requests:
      storage: 10Gi

  volumeMode: Filesystem
