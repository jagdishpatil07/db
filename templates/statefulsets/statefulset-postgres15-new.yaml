apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-app
  namespace: {{ .Values.global.namespace }}

spec:
  serviceName: postgres-app
  replicas: 1

  selector:
    matchLabels:
      app: postgres-app

  template:
    metadata:
      labels:
        app: postgres-app

    spec:
      ########################################################
      # ✅ REQUIRED FOR PRIVATE ACR IMAGE
      ########################################################
      imagePullSecrets:
        - name: acr-secret

      ########################################################
      # ✅ FIX VOLUME PERMISSIONS
      ########################################################
      securityContext:
        fsGroup: 999

      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: Always

          ports:
            - containerPort: 5432

          ########################################################
          # ✅ IMPORTANT PGDATA CONFIG
          ########################################################
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          envFrom:
            - configMapRef:
                name: envs-production-postgres-new
            - secretRef:
                name: secrets-production-postgres-new

          ########################################################
          # ✅ VOLUME MOUNTS
          ########################################################
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data

            - name: backup
              mountPath: /backups

          ########################################################
          # ✅ BASIC TUNING (SAFE DEFAULT)
          ########################################################
          args:
            - "-c"
            - shared_buffers=256MB
            - "-c"
            - work_mem=4MB

      ########################################################
      # ✅ PVC LINKS
      ########################################################
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgresql-data-new-pvc-11-db

        - name: backup
          persistentVolumeClaim:
            claimName: postgresql-backup-new-pvc-11-db

  ########################################################
  # ✅ STATEFULSET SETTINGS
  ########################################################
  updateStrategy:
    type: RollingUpdate

  podManagementPolicy: OrderedReady
``
